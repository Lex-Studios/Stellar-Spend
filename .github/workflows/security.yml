name: Security

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── 1. Dependency Vulnerability Scan ─────────────────────────────────────
  dependency-scan:
    name: Dependency Scan (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high --json > npm-audit.json || true

      - name: Fail on critical vulnerabilities
        run: |
          CRITICAL=$(node -e "
            const r = require('./npm-audit.json');
            const vulns = r.metadata?.vulnerabilities || {};
            console.log(vulns.critical || 0);
          ")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::$CRITICAL critical vulnerabilities found"
            cat npm-audit.json | node -e "
              const r=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              Object.values(r.vulnerabilities||{})
                .filter(v=>v.severity==='critical')
                .forEach(v=>console.error(v.name,v.severity,v.via[0]?.url||''));
            "
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 30

  # ── 2. CodeQL SAST ────────────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  # ── 3. Secret Scanning (Gitleaks) ────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── 4. Dependency Review (PRs only) ──────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  # ── 5. Automated Dependency Updates (scheduled) ──────────────────────────
  check-updates:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: Check for outdated packages
        run: npm outdated --json > outdated.json || true

      - name: Report outdated packages
        run: |
          COUNT=$(node -e "console.log(Object.keys(require('./outdated.json')).length)")
          echo "Outdated packages: $COUNT"
          cat outdated.json

      - uses: actions/upload-artifact@v4
        with:
          name: outdated-packages
          path: outdated.json
          retention-days: 7
